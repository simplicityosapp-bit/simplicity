<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Heart logo as the browser-tab favicon (multiple sizes so
         high-DPI Chrome picks the sharpest one + iOS adds it to the
         home screen at 180px). -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48"  href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F3EE" />
    <title>Simplicity</title>
    <!-- Heebo (Hebrew text) + JetBrains Mono (numbers) — design tokens --mg-font / --mg-font-num -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Apply saved theme + text-size BEFORE React mounts, so the
         page never flashes light on a dark-mode reload. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mg-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
          var s = localStorage.getItem('mg-text-size');
          if (s === 'small' || s === 'normal' || s === 'large') {
            document.documentElement.setAttribute('data-text-size', s);
          }
        } catch (e) { /* private mode — non-fatal */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
