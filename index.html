<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Heart logo as the browser-tab favicon (multiple sizes so
         high-DPI Chrome picks the sharpest one + iOS adds it to the
         home screen at 180px). -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48"  href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <!-- Install / "add to home screen" / desktop-shortcut icon: the full
         app icon (logo on a background). iOS uses apple-touch-icon; Android
         + desktop Chrome/Edge use the manifest icons below. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Link-share preview (WhatsApp / Facebook / Telegram / Twitter): the
         app icon. Uses absolute URLs — scrapers require them. The image is
         square (512×512), so a Twitter "summary" (not large) card fits it. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="סימפליסיטי" />
    <meta property="og:locale" content="he_IL" />
    <meta property="og:url" content="https://simplicity-os.com/" />
    <meta property="og:title" content="סימפליסיטי — מערכת הפעלה לעסק" />
    <meta property="og:description" content="לקוחות, כספים, פגישות ויעדים במקום אחד שקט, בעברית מלאה. ‘מבט על’ מראה אם אתם בקצב — והמידע שלכם מוצפן ופרטי." />
    <meta property="og:image" content="https://simplicity-os.com/app-icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="סימפליסיטי — מערכת הפעלה לעסק" />
    <meta name="twitter:description" content="לקוחות, כספים, פגישות ויעדים במקום אחד שקט, בעברית מלאה. ‘מבט על’ מראה אם אתם בקצב — והמידע שלכם מוצפן ופרטי." />
    <meta name="twitter:image" content="https://simplicity-os.com/app-icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F3EE" />
    <meta name="theme-color" content="#0a0f0a" media="(prefers-color-scheme: dark)" />
    <title>סימפליסיטי | מערכת הפעלה לעסק — למטפלים, מורים ומנחים</title>
    <meta
      name="description"
      content="סימפליסיטי — מערכת הפעלה לעסק למטפלים, מורים ומנחים: לקוחות, כספים, פגישות ויעדים במקום אחד שקט, בעברית. ‘מבט על’ מראה אם אתם בקצב."
    />
    <link rel="canonical" href="https://simplicity-os.com/" />
    <!-- Structured data (schema.org) — the homepage IS the public landing
         page, so the product/brand graph lives here for crawlers. The FAQ
         markup is injected by the landing component (homepage only). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "סימפליסיטי",
            "alternateName": "Simplicity",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "url": "https://simplicity-os.com/",
            "inLanguage": "he",
            "description": "מערכת הפעלה לעסק למטפלים, מורים ומנחים — לקוחות, כספים, פגישות ויעדים במקום אחד, בעברית, עם ‘מבט על’ שמראה אם אתם בקצב להשגת היעדים החודשיים.",
            "image": "https://simplicity-os.com/app-icon-512.png"
          },
          {
            "@type": "Organization",
            "name": "סימפליסיטי",
            "url": "https://simplicity-os.com/",
            "logo": "https://simplicity-os.com/app-icon-512.png",
            "contactPoint": {
              "@type": "ContactPoint",
              "email": "simplicity.os.app@gmail.com",
              "contactType": "customer support"
            }
          },
          {
            "@type": "WebSite",
            "name": "סימפליסיטי",
            "url": "https://simplicity-os.com/",
            "inLanguage": "he"
          }
        ]
      }
    </script>
    <!-- Alef (Hebrew text — pairs with Alef MultiGndr for dual-gender glyphs)
         + Assistant (weight fallback) + JetBrains Mono (numbers). Tokens:
         --mg-font / --mg-font-num. Alef ships Regular+Bold only. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Apply saved theme + text-size BEFORE React mounts, so the
         page never flashes light on a dark-mode reload. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mg-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
          var s = localStorage.getItem('mg-text-size');
          if (s === 'small' || s === 'normal' || s === 'large') {
            document.documentElement.setAttribute('data-text-size', s);
          }
        } catch (e) { /* private mode — non-fatal */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
