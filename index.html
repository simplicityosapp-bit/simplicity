<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Heart logo as the browser-tab favicon (multiple sizes so
         high-DPI Chrome picks the sharpest one + iOS adds it to the
         home screen at 180px). -->
    <link rel="icon" type="image/png" sizes="32x32"  href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48"  href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <!-- Install / "add to home screen" / desktop-shortcut icon: the full
         app icon (logo on a background). iOS uses apple-touch-icon; Android
         + desktop Chrome/Edge use the manifest icons below. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/app-icon-180.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Link-share preview (WhatsApp / Facebook / Telegram / Twitter): the
         app icon. Uses absolute URLs — scrapers require them. The image is
         square (512×512), so a Twitter "summary" (not large) card fits it. -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://simplicity-os.com/" />
    <meta property="og:title" content="Simplicity — סימפליסיטי" />
    <meta property="og:description" content="מערכת ניהול לקליניקה ולמטפלים — לקוחות, כספים, יעדים ועוד." />
    <meta property="og:image" content="https://simplicity-os.com/app-icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Simplicity — סימפליסיטי" />
    <meta name="twitter:description" content="מערכת ניהול לקליניקה ולמטפלים — לקוחות, כספים, יעדים ועוד." />
    <meta name="twitter:image" content="https://simplicity-os.com/app-icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F3EE" />
    <title>Simplicity</title>
    <!-- Alef (Hebrew text — pairs with Alef MultiGndr for dual-gender glyphs)
         + Assistant (weight fallback) + JetBrains Mono (numbers). Tokens:
         --mg-font / --mg-font-num. Alef ships Regular+Bold only. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Apply saved theme + text-size BEFORE React mounts, so the
         page never flashes light on a dark-mode reload. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mg-theme');
          if (t === 'dark' || t === 'light') {
            document.documentElement.setAttribute('data-theme', t);
          }
          var s = localStorage.getItem('mg-text-size');
          if (s === 'small' || s === 'normal' || s === 'large') {
            document.documentElement.setAttribute('data-text-size', s);
          }
        } catch (e) { /* private mode — non-fatal */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
